<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" rx="36" fill="#051020"/>
  <rect x="56" y="56" width="1488" height="848" rx="30" fill="#091B35" stroke="#16395D"/>
  <text x="112" y="142" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="700">Production-Style Architecture</text>
  <rect x="112" y="258" width="292" height="430" rx="28" fill="#102346"/>
  <text x="146" y="312" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 01</text>
  <text x="146" y="366" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Acquire</text>
  <text x="146" y="430" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">Collect listing data from Realtor.com through a simple Python interface.</text>
  <rect x="462" y="258" width="292" height="430" rx="28" fill="#102346"/>
  <text x="496" y="312" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 02</text>
  <text x="496" y="366" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Normalize</text>
  <text x="496" y="430" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">Align address, price, beds, baths, status, and metadata into reusable records.</text>
  <rect x="812" y="258" width="292" height="430" rx="28" fill="#102346"/>
  <text x="846" y="312" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 03</text>
  <text x="846" y="366" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Deliver</text>
  <text x="846" y="430" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">Hand off results to CSV, Excel, Pandas, Pydantic, or downstream applications.</text>
  <rect x="1162" y="258" width="292" height="430" rx="28" fill="#102346"/>
  <text x="1196" y="312" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 04</text>
  <text x="1196" y="366" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Operate</text>
  <text x="1196" y="430" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">Add monitoring, retries, scheduling, validation, and QA for dependable production workflows.</text>
  <path d="M404 474H462" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M754 474H812" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M1104 474H1162" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
  <rect x="396" y="754" width="808" height="82" rx="22" fill="#1EE7D4" fill-opacity="0.12" stroke="#1EE7D4" stroke-opacity="0.35"/>
  <text x="444" y="806" fill="#EAF6FF" font-family="Arial, sans-serif" font-size="28" font-weight="700">HomeHarvest becomes the collection layer in a larger property intelligence stack</text>
</svg>
